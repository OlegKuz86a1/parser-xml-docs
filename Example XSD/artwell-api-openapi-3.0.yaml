openapi: 3.0.3
info:
  title: Артвелл — API исполнительной документации (XML / XSD)
  description: |
    **Минимальный набор операций под ТЗ:**
    1. **Загрузка и валидация** — `POST /documents/upload` (multipart), результат в теле: валидность (`validation.status`) и сообщения XSD (`validation.messages`); при ошибке — `400` с описанием.
    2. **Парсинг и сохранение** — в ответе `201` — извлечённые поля в `document` (номер, дата, объект, участники и пр.).
    3. **Просмотр** — `GET /documents` (список), `GET /documents/{documentId}` (карточка), `GET /documents/{documentId}/xml` (оригинальный XML текущей версии).
    4. **Версионность** — повторная загрузка с тем же номером документа создаёт новую версию через тот же `POST /documents/upload`; история — `GET /documents/{documentId}/versions`.

    Аутентификация и прочее вне этого файла.
  version: 1.0.0
  contact:
    name: Артвелл
    url: https://www.minstroyrf.gov.ru/tim/xml-skhemy/

servers:
  - url: http://localhost:8080/api/v1
    description: Локальная разработка
  - url: https://{host}/api/v1
    description: Staging / production
    variables:
      host:
        default: api.example.com

tags:
  - name: documents
    description: Документы XML — ТЗ (загрузка, список, карточка, XML, версии)

security:
  - bearerAuth: []

paths:
  /documents:
    get:
      tags: [documents]
      summary: Список документов (пагинация)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Страница документов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDocumentSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /documents/{documentId}:
    get:
      tags: [documents]
      summary: Карточка документа
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /documents/{documentId}/xml:
    get:
      tags: [documents]
      summary: Скачать оригинальный XML (текущая актуальная версия)
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Файл XML
          content:
            application/xml:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /documents/upload:
    post:
      tags: [documents]
      summary: Загрузка XML — валидация XSD, парсинг, сохранение в БД и файла; новая версия при том же номере документа
      description: |
        Номер документа из XML или параметр `documentNumber`. Новый номер — первый документ и версия 1; совпадение — следующая версия.
      parameters:
        - name: documentNumber
          in: query
          required: false
          description: Если номер нельзя извлечь из XML
          schema:
            type: string
        - name: constructionObjectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: XML-файл
      responses:
        '201':
          description: Документ сохранён; `validation.status` — VALID (предупреждения XSD перечислены в `validation.messages`); при INVALID загрузка не выполняется — см. `400`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: Ошибка валидации XSD (невалидный документ) или запроса; текст проблемы — `message` / `details`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /documents/{documentId}/versions:
    get:
      tags: [documents]
      summary: История версий документа (от новой к старой)
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Список версий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentVersion'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Нет прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ValidationStatus:
      type: string
      enum: [VALID, INVALID]
      description: VALID — валидный документ (предупреждения — в `ValidationResult.messages`); INVALID — ошибка валидации

    DocumentSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        documentNumber:
          type: string
        documentType:
          type: string
          description: Код типа документа (маппинг на XSD Минстроя)
        title:
          type: string
        constructionObjectName:
          type: string
        constructionObjectId:
          type: string
          format: uuid
        documentDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/ValidationStatus'
        currentVersion:
          type: integer
        updatedAt:
          type: string
          format: date-time

    PageDocumentSummary:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    Participant:
      type: object
      description: Участник (ключевое поле по ТЗ)
      properties:
        name:
          type: string
        role:
          type: string
        organization:
          type: string

    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentSummary'
        - type: object
          properties:
            participants:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
            extractedMetadata:
              type: object
              additionalProperties: true
              description: Прочие извлечённые поля
            createdAt:
              type: string
              format: date-time
            createdByUserId:
              type: string
              format: uuid

    DocumentVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        versionNumber:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: string
          format: uuid
        validationStatus:
          $ref: '#/components/schemas/ValidationStatus'
        fileName:
          type: string
        fileSizeBytes:
          type: integer
          format: int64

    ValidationMessage:
      type: object
      properties:
        severity:
          type: string
          enum: [ERROR, WARNING]
        line:
          type: integer
        column:
          type: integer
        message:
          type: string
        xpath:
          type: string

    ValidationResult:
      type: object
      description: Результат проверки XSD для отображения пользователю
      properties:
        status:
          $ref: '#/components/schemas/ValidationStatus'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ValidationMessage'

    UploadResult:
      type: object
      properties:
        documentId:
          type: string
          format: uuid
        versionId:
          type: string
          format: uuid
        validation:
          $ref: '#/components/schemas/ValidationResult'
        document:
          $ref: '#/components/schemas/DocumentDetail'

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
          description: Краткий текст ошибки (в т.ч. «ошибка валидации»)
        details:
          type: array
          items:
            type: string
          description: Описание проблемы, детали XSD
